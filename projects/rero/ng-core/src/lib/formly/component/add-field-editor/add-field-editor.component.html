<div>
  <p-autoComplete
    [dropdown]="true"
    #addField
    optionLabel="props.label"
    [placeholder]="'Add field' | translate"
    class="core:mb-2 core:w-full"
    [suggestions]="suggestions"
    (completeMethod)="search($event)"
    (onSelect)="onSelect($event)"
    [disabled]="items().length < 1"
    scrollHeight="400px"
    appendTo="body"
  />
</div>

@if (essentialsOptions().length > 0) {
  <p-listbox [options]="essentialsOptions()" scrollHeight="" class="core:mt-2" (onChange)="onAddField($event)">
    <ng-template #item let-item>
      {{ item.props.label }}
    </ng-template>
  </p-listbox>
}
