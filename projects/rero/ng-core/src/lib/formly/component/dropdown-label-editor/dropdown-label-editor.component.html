@if (field().props?.label) {
  <div class="core:flex core:items-center">
    <span class="p-fieldset-legend-label" [pTooltip]="field().props?.description" tooltipPosition="top">
      {{ field().props?.label }}
      @if (field().props?.required) {
        &nbsp;*
      }
    </span>
    <ng-content select="[menu]" />
    <ng-content id="{field.id}-clone-button" select="[buttons]" />
  </div>
}
