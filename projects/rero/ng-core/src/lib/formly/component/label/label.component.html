@if (field()) {
  <!-- header and menu -->
  @if (!isRoot()) {
    <ng-container *ngTemplateOutlet="hasMenu() ? menu : title; context: { f: field() }" />
  }

  <!-- TEMPLATES -->
  <!-- dropdown menu -->
  <ng-template #menu let-f="f">
    <ng-core-editor-dropdown-label-editor [field]="f" [canAdd]="false">
      <ng-container menu>
        <div class="core:flex">
          <p-button
            icon="fa-solid fa-caret-down"
            severity="secondary"
            size="small"
            [text]="true"
            (onClick)="menu.toggle($event)"
          />
          <p-tieredMenu #menu [model]="items()" [popup]="true" appendTo="body" />
        </div>
      </ng-container>
      <ng-container buttons>
        <div class="core:flex">
          @if (canAddItem()) {
            <p-button icon="fa-regular fa-square-plus" severity="secondary" size="small" [text]="true" (onClick)="addItem()" />
          }
          @if (canAdd()) {
            <p-button
              id="{{ f.id }}-clone-button"
              icon="fa-regular fa-clone"
              severity="secondary"
              size="small"
              [text]="true"
              (onClick)="add()"
            />
          }
          <!-- hide button -->
          @if (canRemove()) {
            <p-button
              id="{{ f.id }}-remove-button"
              icon="fa-solid fa-trash-can"
              severity="secondary"
              size="small"
              [text]="true"
              (onClick)="remove()"
            />
          }
        </div>
      </ng-container>
    </ng-core-editor-dropdown-label-editor>
  </ng-template>

  <!-- section title -->
  <ng-template #title let-f="f">
    <div class="core:flex core:gap-1 core:items-center">
      @if (label()) {
        <label class="p-fieldset-legend-label" [attr.for]="f.id" [pTooltip]="f.props.description" tooltipPosition="top">
          {{ label() }}
        </label>
        @if (required() && f.props.hideRequiredMarker !== true) {
          *
        }
        @if (canAddItem()) {
          <p-button icon="fa-regular fa-square-plus" severity="secondary" [text]="true" size="small" (onClick)="addItem()" />
        }
        @if (canAdd()) {
          <p-button
            id="{{ f.id }}-clone-button"
            icon="fa-regular fa-clone"
            [text]="true"
            severity="secondary"
            size="small"
            (onClick)="add()"
          />
        }
        <!-- hide button -->
        @if (canRemove()) {
          <p-button
            id="{{ f.id }}-remove-button"
            icon="fa-solid fa-trash-can"
            [text]="true"
            severity="secondary"
            size="small"
            (onClick)="remove()"
          />
        }
      }
    </div>
  </ng-template>
}
