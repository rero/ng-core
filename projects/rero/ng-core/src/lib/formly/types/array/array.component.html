<!-- array title only if the array is empty -->

@if (props.label && field.props.hideLabel !== true) {
  <ng-core-label-editor [field]="field" />
}

<div>
  @if (showError) {
    <div class="text-error core:my-2">
      <formly-validation-message [field]="field" />
    </div>
  }
  <!-- for each item -->
  <div [class]="props.containerCssClass">
    @for (f of field.fieldGroup; track f.id) {
      @if (!f.hide) {
        <div class="{{ f.props?.itemCssClass }} core:mb-1" [id]="'field-' + f.id">
          <formly-field [field]="f" />
        </div>
      }
    }
  </div>
</div>
