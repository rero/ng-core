<div>
  @if (record()) {
    <ng-core-detail-button
      [record]="record() ?? null"
      [type]="type()"
      [adminMode]="adminMode()"
      [useStatus]="useStatus()"
      [updateStatus]="updateStatus()"
      [deleteStatus]="deleteStatus()"
      (recordEvent)="recordEvent($event)"
      (deleteMessageEvent)="showDeleteMessage($event)"
    />
  }
  @let err = error();
  @if (err) {
    <ng-core-error [error]="err" />
  }
  <ng-container #dynamicHost />
</div>
