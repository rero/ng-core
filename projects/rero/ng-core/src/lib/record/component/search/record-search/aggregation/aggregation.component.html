<!-- Aggregation with no bucket, containing only the count. -->
@if (aggregation().doc_count) {
  <div class="core:mb-4">
    <ng-core-record-search-aggregation-buckets
      [buckets]="[{ key: '1', doc_count: aggregation().doc_count, aggregationKey: '', name: (store.aggregationNameFromConfig(aggregation().key) || aggregation().name || aggregation().key | translate | ucfirst) || '' }]"
      [aggregationKey]="aggregation().key"
    />
  </div>
} @else {
  <p-fieldset
    [legend]="(store.aggregationNameFromConfig(aggregation().key) || aggregation().name || aggregation().key | translate | ucfirst) || ''"
    [toggleable]="true"
    [collapsed]="!isAggregationDisplayed()"
    (collapsedChange)="toggleVisibility()"
  >
    <div class="core:p-2">
      @switch (aggregation().type) {
        @case ('range') {
          <ng-core-aggregation-slider [key]="aggregation().key" />
        }
        @case ('date-range') {
          <ng-core-aggregation-date-range [key]="aggregation().key" />
        }
        @default {
          @if (aggregation().value.buckets.length > 0) {
            <ng-core-record-search-aggregation-buckets
              [buckets]="aggregation().value.buckets"
              [aggregationKey]="aggregation().key"
            />
          } @else {
            @if (aggregation().loaded) {
              <span class="core:text-sm" translate>No result</span>
            }
          }
        }
      }
    </div>
  </p-fieldset>
}
