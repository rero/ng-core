@if (filters().length) {
  <div class="core:flex core:flex-wrap core:mb-2">
    @for (filter of filters(); track filter.key) {
      <p-button
        class="core:mr-2 core:mb-2"
        [label]="(filter.label$ | async)!"
        icon="fa-solid fa-xmark"
        [outlined]="true"
        severity="secondary"
        [title]="filter.aggregationKey | translate"
        (onClick)="removeFilter(filter)"
      />
    }
  </div>
}
