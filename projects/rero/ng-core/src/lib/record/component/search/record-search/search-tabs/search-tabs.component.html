@if (typesInTabs().length > 1) {
  <p-tabs [(value)]="currentType">
    <p-tablist>
      @for (tab of typesInTabs(); track tab.key) {
        <p-tab [value]="tab.key">{{ tab.label | translate }}</p-tab>
      }
    </p-tablist>
  </p-tabs>
}
